name: Release critters-lsp

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
            binary_name: critters-lsp
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive_ext: tar.gz
            binary_name: critters-lsp
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_ext: tar.gz
            binary_name: critters-lsp
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
            binary_name: critters-lsp.exe

    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artefacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Build release binary
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}

      - name: Package Unix artefact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          asset="critters-lsp-${version}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" critters-lsp
          tar -czf "dist/${asset}" critters-lsp

      - name: Package Windows artefact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $asset = "critters-lsp-$version-${{ matrix.target }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "critters-lsp.exe"
          Compress-Archive -Path "critters-lsp.exe" -DestinationPath "dist/$asset"

      - name: Upload artefact
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: dist/*
