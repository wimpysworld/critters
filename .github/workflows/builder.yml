name: Builder 👷

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 0" # Weekly
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-code:
    name: Lint Code 🧹
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  lint-actions:
    name: Lint Action ⚙️
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: freerangebytes/setup-actionlint@fbad42719bf03f8edd31dc02d5ec387cb26b6ed0 # v0.1.1
      - name: Run actionlint
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          actionlint -color

  test:
    name: Test ${{ matrix.os }} 🧪
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
          - os: macos
            runner: macos-15
          - os: windows
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run tests
        run: cargo test --workspace

  zed-extension:
    name: Zed Extension 🧩
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - name: Build Zed extension WebAssembly
        run: cargo build --package critters-zed --target wasm32-wasip2

  security:
    name: Security 🔒
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install cargo-audit
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-audit
      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  sentinel:
    name: Sentinel 👁️
    needs: [lint-code, lint-actions, test, zed-extension, security]
    if: always()
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: ${results}"
          if echo "${results}" | jq -e 'any(. == "failure" or . == "cancelled")' > /dev/null 2>&1; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed"

  build:
    name: Build ${{ matrix.job.target }}
    needs: [sentinel]
    if: always() && needs.sentinel.result == 'success' && github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        job:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: critters-lsp
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: critters-lsp
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: critters-lsp
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            binary: critters-lsp
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: critters-lsp.exe
            archive: zip
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.job.target }}
      - name: Get package version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build release binary
        run: cargo build --locked --release --package critters-lsp --target ${{ matrix.job.target }}
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.job.target }}
          BINARY: ${{ matrix.job.binary }}
        run: |
          set -euo pipefail
          package="critters-lsp-${VERSION}-${TARGET}"
          mkdir -p "dist/${package}"
          cp "target/${TARGET}/release/${BINARY}" "dist/${package}/critters-lsp"
          cp README.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.job.target }}
          BINARY: ${{ matrix.job.binary }}
        run: |
          $package = "critters-lsp-$env:VERSION-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY" "dist/$package/critters-lsp.exe"
          Copy-Item README.md, LICENSE "dist/$package/"
          Compress-Archive -Path "dist/$package/*" -DestinationPath "dist/$package.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: critters-lsp-${{ matrix.job.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Release 📦
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            git log "$PREV_TAG"..HEAD --pretty=format:"* %s (%h)" >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            git log --pretty=format:"* %s (%h)" >> CHANGELOG.md
          fi

          cat >> CHANGELOG.md << 'NOTES'

          ## Installation

          Download the archive for your platform below, extract it, and either put `critters-lsp` on your PATH or configure `lsp.critters-lsp.binary.path` in Zed.

          ## Integrity

          GitHub computes SHA256 digests for release assets automatically and exposes them in the release UI, REST API, GraphQL API, and GitHub CLI.
          NOTES

          cat CHANGELOG.md
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: critters-lsp-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: critters ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: artifacts/*
